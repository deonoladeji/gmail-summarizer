name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/gmail-summarizer
            git pull origin main
            sudo docker rm -f gmail-app
            sudo docker build -t gmail-summarizer .
            sudo docker run -d -p 8501:8501 --name gmail-app gmail-summarizer
